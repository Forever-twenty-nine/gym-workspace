<div class="p-6 h-full flex flex-col min-h-0">
  
  <!-- Pestañas (diseño unificado compacto) -->
  <app-tabs [tabs]="tabs()" [active]="activeTab()" (tabChange)="setTab($event)"></app-tabs>

  <!-- PESTAÑA 1: MATCHES Y CONEXIONES (usando componente genérico data) -->
  <div *ngIf="activeTab() === 'matches'" class="flex-1 flex flex-col min-h-0">
    <app-data
      title="Matches & Conexiones"
      [items]="mappedMatches()"
      [columns]="matchColumns"
      [fields]="matchFields"
      [showCreate]="false"
      [showActions]="false">
    </app-data>
  </div>

  <!-- PESTAÑA 2: DESAFÍOS usando componente genérico -->
  <div *ngIf="activeTab() === 'desafios'" class="flex-1 flex flex-col min-h-0">
    <app-data
      title="Desafíos Comunitarios"
      [items]="desafios()"
      [columns]="desafioColumns"
      [fields]="desafioFields()"
      [showCreate]="true"
      (delete)="eliminarDesafio($event)"
      (save)="onSaveDesafio($event)">
    </app-data>
  </div>

  <!-- PESTAÑA 3: MENSAJES PERSONALES (chats entre usuarios que hicieron match) -->
  <div *ngIf="activeTab() === 'mensajes'" class="flex-1 flex flex-col min-h-0">
    <app-data
      title="Mensajes Personales"
      [items]="mensajesEnriquecidos()"
      [columns]="mensajeColumns"
      [fields]="mensajeFields"
      [showCreate]="false"
      [showActions]="false">
    </app-data>
  </div>

</div>
