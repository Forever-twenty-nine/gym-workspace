<div class="space-y-3 w-full max-w-md">
  @for (toast of toasts(); track toast.id) {
    <div 
      [class]="getToastClasses(toast)"
      [class.opacity-0]="!toast.isVisible"
      [class.translate-x-full]="!toast.isVisible"
      class="transform transition-all duration-300 ease-in-out w-full pointer-events-auto">
      
      <div class="flex items-start">
        <!-- Icono -->
        <div class="shrink-0">
          <span class="material-icons text-2xl" [class]="getIconClasses(toast.type)">
            @switch (toast.type) {
              @case ('success') { check_circle }
              @case ('error') { error }
              @case ('warning') { warning }
              @case ('info') { info }
            }
          </span>
        </div>
        
        <!-- Mensaje -->
        <div class="ml-3 flex-1 pt-0.5">
          <p [class]="getTextClasses(toast.type)">{{ toast.message }}</p>
        </div>
        
        <!-- Botón cerrar -->
        <div class="ml-4 shrink-0 flex">
          <button 
            [class]="getCloseButtonClasses(toast.type)"
            (click)="closeToast.emit(toast.id)">
            <span class="material-icons text-xl">close</span>
          </button>
        </div>
      </div>
    </div>
  }
</div>
