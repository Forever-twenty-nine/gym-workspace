<ion-content [fullscreen]="true">
  <!-- Background Image Layer (Fixed) -->
  <app-gym-background [isPremium]="isPremium()"></app-gym-background>

  <!-- Buscador Reactivo -->
  <ion-searchbar placeholder="Buscar entrenados..." class="mb-4"
    (ionInput)="searchQuery.set($event.detail.value || '')"></ion-searchbar>

  <!-- Listado de Entrenados -->
  <app-entrenados-grouped-list [groupedUsers]="groupedUsers()"></app-entrenados-grouped-list>

</ion-content>
