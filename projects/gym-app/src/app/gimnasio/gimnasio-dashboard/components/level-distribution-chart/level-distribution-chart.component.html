<div class="mb-5">
  <ion-text class="text-[9px] text-white/60 uppercase tracking-widest font-extrabold block mb-3">
    Distribución por Nivel
  </ion-text>
  
  <div class="flex items-end justify-around h-24 pt-4 mb-1 bg-white/5 rounded-xl border border-white/5 px-2 relative">
    <!-- Líneas de cuadrícula de fondo -->
    <div class="absolute inset-x-0 top-1/3 border-b border-white/5 pointer-events-none"></div>
    <div class="absolute inset-x-0 top-2/3 border-b border-white/5 pointer-events-none"></div>

    <!-- Columna Novato / Principiante -->
    <div class="flex flex-col items-center w-14 z-10">
      <div class="w-7 bg-gradient-to-t from-[rgba(45,211,111,0.2)] to-[rgba(45,211,111,1)] rounded-t-md transition-all duration-500 relative flex items-end justify-center"
           [style.height.px]="total() ? (novato() / total()) * 60 : 0">
        <ion-text class="absolute -top-4 text-[9px] font-bold text-white">
          {{ novato() }}
        </ion-text>
      </div>
      <ion-text class="text-[8px] text-white/50 uppercase mt-1 block tracking-tight">Principiante</ion-text>
    </div>
    
    <!-- Columna Intermedio -->
    <div class="flex flex-col items-center w-14 z-10">
      <div class="w-7 bg-gradient-to-t from-[rgba(255,196,9,0.2)] to-[rgba(255,196,9,1)] rounded-t-md transition-all duration-500 relative flex items-end justify-center"
           [style.height.px]="total() ? (intermedio() / total()) * 60 : 0">
        <ion-text class="absolute -top-4 text-[9px] font-bold text-white">
          {{ intermedio() }}
        </ion-text>
      </div>
      <ion-text class="text-[8px] text-white/50 uppercase mt-1 block tracking-tight">Intermedio</ion-text>
    </div>

    <!-- Columna Avanzado / Experto -->
    <div class="flex flex-col items-center w-14 z-10">
      <div class="w-7 bg-gradient-to-t from-[rgba(187,228,10,0.2)] to-[rgba(187,228,10,1)] rounded-t-md transition-all duration-500 relative flex items-end justify-center"
           [style.height.px]="total() ? (avanzado() / total()) * 60 : 0">
        <ion-text class="absolute -top-4 text-[9px] font-bold text-white">
          {{ avanzado() }}
        </ion-text>
      </div>
      <ion-text class="text-[8px] text-white/50 uppercase mt-1 block tracking-tight">Avanzado</ion-text>
    </div>
  </div>
</div>
