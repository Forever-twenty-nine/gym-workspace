<ion-content [fullscreen]="true" style="--background: transparent;">
  <!-- Background Layer -->
  <app-background />
  <!-- CONTENIDO DE ESTADÍSTICAS DETALLADAS (GLASSMORPHIC) -->
  <div class="relative z-10 p-4 max-w-lg mx-auto mb-16 fade-in">

    <!-- Cabecera de Página Minimalista (Estilo App Móvil) -->
    <div class="flex items-center justify-between px-2 mb-6">
      <div>
        <h2 class="text-xl font-black text-white m-0 tracking-tight">Estadísticas</h2>
        <span class="text-[9px] font-extrabold text-(--ion-color-primary) tracking-widest uppercase block mt-0.5">Gimnasio</span>
      </div>
      
      <!-- Mini Anillo de Activación SVG -->
      @if (isPremium()) {
        <app-gym-activation-ring [rate]="stats().activationRate"></app-gym-activation-ring>
      }
    </div>

    @if (isPremium()) {
      <!-- Selector de Segmento Pill (Estilo App Móvil) -->
      <div class="flex bg-white/5 border border-white/10 rounded-xl p-1 mb-4">
        <button class="flex-1 py-1.5 text-xs font-black rounded-lg transition-all duration-200"
                [class.bg-white/10]="selectedSegment() === 'entrenadores'"
                [class.text-white]="selectedSegment() === 'entrenadores'"
                [class.text-white/40]="selectedSegment() !== 'entrenadores'"
                (click)="selectedSegment.set('entrenadores')">
          Entrenadores
        </button>
        <button class="flex-1 py-1.5 text-xs font-black rounded-lg transition-all duration-200"
                [class.bg-white/10]="selectedSegment() === 'entrenados'"
                [class.text-white]="selectedSegment() === 'entrenados'"
                [class.text-white/40]="selectedSegment() !== 'entrenados'"
                (click)="selectedSegment.set('entrenados')">
          Entrenados
        </button>
      </div>

      <!-- 2. Sección: Entrenadores -->
      @if (selectedSegment() === 'entrenadores') {
        <app-gym-trainer-stats
          [totalTrainers]="stats().totalTrainers"
          [activeTrainers]="stats().activeTrainers"
          [avgTraineesPerTrainer]="stats().avgTraineesPerTrainer"
          [routinesCreatedByTrainers]="stats().routinesCreatedByTrainers"
          [pendingInvitations]="stats().pendingInvitations">
        </app-gym-trainer-stats>
      }

      <!-- 3. Sección: Entrenados -->
      @if (selectedSegment() === 'entrenados') {
        <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-4 mb-5 fade-in">
          <div class="pb-2 border-b border-white/5 mb-3">
            <h3 class="text-xs font-bold uppercase tracking-widest text-white/70 m-0">Entrenados</h3>
          </div>

          <app-gym-trainee-stats
            [totalTrainees]="stats().totalTrainees"
            [activeTrainees]="stats().activeTrainees"
            [traineesWithoutTrainer]="stats().traineesWithoutTrainer">
          </app-gym-trainee-stats>

          <!-- Gráfico de Columnas Verticales para Distribución de Nivel -->
          <app-level-distribution-chart
            [total]="stats().totalTrainees"
            [novato]="stats().levelNovatoPrincipiante"
            [intermedio]="stats().levelIntermedio"
            [avanzado]="stats().levelAvanzadoExperto">
          </app-level-distribution-chart>

          <!-- Gráfico de Barra Segmentada Acumulativa para Objetivos -->
          <app-objective-distribution-chart
            [total]="stats().totalTrainees"
            [salud]="stats().objSalud"
            [volumen]="stats().objVolumen"
            [definicion]="stats().objDefinicion"
            [fuerza]="stats().objFuerza">
          </app-objective-distribution-chart>
        </div>
      }
    } @else {
      <app-premium-upgrade-banner (upgrade)="mejorarPlan()"></app-premium-upgrade-banner>
    }

  </div>
</ion-content>
