<ion-content [fullscreen]="true" style="--background: transparent;">

  <app-gym-background [isPremium]="isPremium()"></app-gym-background>

  <div class="main-container ion-padding relative z-10 flex flex-col gap-6 pb-20">
    
    <div class="flex items-center gap-3">
      <ion-segment [value]="segmentoActivo()" (ionChange)="cambiarSegmento($event)" class="premium-segment bg-white/30 dark:bg-black/30 backdrop-blur-md rounded-full p-1 flex-1" style="--border-radius: 9999px;">
        <ion-segment-button value="oficial" class="font-extrabold text-xs" style="--border-radius: 9999px;">
          <ion-label>Agenda Oficial (WODs)</ion-label>
        </ion-segment-button>
        <ion-segment-button value="atletas" class="font-extrabold text-xs" style="--border-radius: 9999px;">
          <ion-label>Propuestas de Atletas</ion-label>
        </ion-segment-button>
      </ion-segment>
      
      <button id="help-trigger-agenda" class="w-9 h-9 rounded-full bg-white/30 dark:bg-black/30 backdrop-blur-md hover:bg-white/40 active:scale-95 transition-all flex items-center justify-center border border-white/20 text-white shadow-md cursor-pointer shrink-0" style="border-radius: 50% !important;">
        <span class="material-symbols-outlined text-lg">info</span>
      </button>
    </div>

    <app-agenda-help-popover triggerId="help-trigger-agenda"></app-agenda-help-popover>

    @if (segmentoActivo() === 'oficial') {
      <app-convocatoria-list
        [items]="mappedConvocatoriasOficiales()"
        emptyTitle="Sin WODs"
        emptyMessage="No hay entrenamientos planificados para esta semana."
        emptyIcon="calendar-outline">
      </app-convocatoria-list>
    }

    @if (segmentoActivo() === 'atletas') {
      <app-convocatoria-list
        [items]="mappedConvocatoriasAtletas()"
        emptyTitle="Sin propuestas"
        emptyMessage="No hay convocatorias activas de alumnos esta semana."
        emptyIcon="hand-right-outline">
      </app-convocatoria-list>
    }

  </div>
</ion-content>
