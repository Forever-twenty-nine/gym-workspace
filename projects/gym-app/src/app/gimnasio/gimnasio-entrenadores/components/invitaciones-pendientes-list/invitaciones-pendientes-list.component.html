@if (invitaciones().length > 0) {
  <ion-card class="bg-white/5 backdrop-blur-md border border-white/10 rounded-3xl overflow-hidden mt-6 p-4 ion-no-margin shadow-none">
    <ion-card-header class="py-2 border-b border-white/5 mb-3 p-0">
      <ion-card-title class="text-center text-xs font-bold uppercase tracking-widest text-white/70 m-0">
        Invitaciones Pendientes
      </ion-card-title>
    </ion-card-header>
    
    <ion-list style="background: transparent;" class="p-0 m-0">
      @for (invitacion of invitaciones(); track invitacion.id) {
        <ion-item class="--background: transparent; mb-1" lines="none">
          <ion-avatar slot="start" class="w-8 h-8 border border-white/10">
            <img [src]="'https://api.dicebear.com/7.x/avataaars/svg?seed=' + invitacion.id" />
          </ion-avatar>
          <ion-label>
            <h3 class="font-bold text-white text-xs m-0">{{ invitacion.entrenadorNombre || invitacion.emailDestinatario }}</h3>
            <p class="text-white/60 text-[10px]">{{ invitacion.emailDestinatario }}</p>
            <p class="text-[9px] text-white/40">
              Enviada el {{ invitacion.fechaCreacion | date:'dd/MM/yyyy HH:mm' }}
            </p>
          </ion-label>
          <ion-button slot="end" fill="clear" color="danger" (click)="cancelar.emit(invitacion.id)">
            <ion-icon name="close-circle-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-item>
      }
    </ion-list>
  </ion-card>
}
