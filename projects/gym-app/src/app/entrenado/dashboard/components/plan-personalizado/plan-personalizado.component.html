<section class="p-2">
  <h2 class="font-heading text-lg font-semibold flex justify-between items-center mb-3 text-gray-900 dark:text-white">
    Mi Plan Personalizado
  </h2>
  <div class="flex flex-col gap-2 p-4 items-start bg-gray-50 border-gray-200 text-gray-800 dark:bg-white/10 dark:backdrop-blur-md rounded-2xl border dark:border-white/20">
    <!-- nivel -->
    <div class="w-full flex flex-row items-center gap-3 text-gray-700 dark:text-white/90">
      <ion-icon name="accessibility-outline" class="!text-xl"></ion-icon>
      <p class="text-base ">
        {{ nivel || 'No definido' }}
      </p>
    </div>
    <!-- objetivo -->
    <div class="w-full flex flex-row items-center gap-3 text-gray-700 dark:text-white/90">
      <ion-icon name="medal-outline" class="!text-xl"></ion-icon>
      <p class="text-base ">
        {{ objetivo }}
      </p>
    </div>
    <!-- frecuencia -->
    <div class=" w-full min-w-28 flex flex-row items-center gap-3 text-gray-700 dark:text-white/90">
      <ion-icon name="today-outline" class="!text-xl"></ion-icon>
      <p class="text-base ">
        {{ frecuencia }} días por semana
      </p>
    </div>
  </div>
</section>
