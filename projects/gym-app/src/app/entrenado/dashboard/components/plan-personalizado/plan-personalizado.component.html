<ion-card>
  <ion-grid class="ion-no-padding">
    <ion-row class="ion-text-center">
      
      <!-- Nivel -->
      <ion-col size="4" class="ion-padding-vertical">
        <div class="text-[10px] font-bold uppercase tracking-wider opacity-60 mb-1">Nivel</div>
        <ion-badge color="secondary" class="w-full max-w-[90%] truncate">
          {{ nivel || 'No definido' }}
        </ion-badge>
      </ion-col>

      <!-- Objetivo -->
      <ion-col size="4" class="ion-padding-vertical">
        <div class="text-[10px] font-bold uppercase tracking-wider opacity-60 mb-1">Objetivo</div>
        <ion-badge color="secondary" class="w-full max-w-[90%] truncate" [title]="objetivo">
          {{ objetivo || 'No definido' }}
        </ion-badge>
      </ion-col>

      <!-- Frecuencia -->
      <ion-col size="4" class="ion-padding-vertical">
        <div class="text-[10px] font-bold uppercase tracking-wider opacity-60 mb-1">Frecuencia</div>
        <ion-badge color="secondary" class="w-full max-w-[90%] truncate">
          {{ frecuencia || '0' }} d/sem
        </ion-badge>
      </ion-col>

    </ion-row>
  </ion-grid>

  @if(entrenadorAsignado) {
    <ion-item lines="none">
      <ion-avatar slot="start" class="mr-3">
        <img [src]="photoURL || 'assets/images/avatar-placeholder.png'" alt="Avatar">
      </ion-avatar>
      <ion-label>
        <p>{{ entrenadorAsignado }}</p>
      </ion-label>
      <ion-note slot="end">Entrenador</ion-note>
    </ion-item>
  }
</ion-card>
