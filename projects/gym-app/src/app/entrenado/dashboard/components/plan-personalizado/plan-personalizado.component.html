<section class="px-2 pt-1 pb-1">
  <h2 class="text-base font-semibold text-gray-900 dark:text-white tracking-tight mb-1.5">
    Mi Plan
  </h2>
  <div class="flex flex-col gap-1 px-3 py-2.5 bg-white/70 dark:bg-white/10 backdrop-blur-md border border-white/40 dark:border-white/10 rounded-2xl text-sm">
    <div class="flex items-center gap-2 text-gray-700 dark:text-white/90">
      <ion-icon name="accessibility-outline" class="text-base opacity-75"></ion-icon>
      <span class="text-[13px]">{{ nivel || 'Nivel no definido' }}</span>
    </div>
    <div class="flex items-center gap-2 text-gray-700 dark:text-white/90">
      <ion-icon name="medal-outline" class="text-base opacity-75"></ion-icon>
      <span class="text-[13px] truncate">{{ objetivo }}</span>
    </div>
    <div class="flex items-center gap-2 text-gray-700 dark:text-white/90">
      <ion-icon name="today-outline" class="text-base opacity-75"></ion-icon>
      <span class="text-[13px]">{{ frecuencia || 0 }} días/semana</span>
    </div>
  </div>
</section>
