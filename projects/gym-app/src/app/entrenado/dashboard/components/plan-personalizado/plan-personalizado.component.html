<ion-card>
  <ion-grid class="ion-no-padding">
    <ion-row class="ion-text-center">

      <ion-col size="4" class="ion-padding-vertical">
        <ion-text color="medium">
          <p class="ion-text-uppercase" style="font-size: 10px; font-weight: 700; letter-spacing: 0.05em;">Nivel</p>
        </ion-text>
        <ion-badge color="secondary" class="ion-text-uppercase">
          {{ nivel || 'No definido' }}
        </ion-badge>
      </ion-col>

      <ion-col size="4" class="ion-padding-vertical">
        <ion-text color="medium">
          <p class="ion-text-uppercase" style="font-size: 10px; font-weight: 700; letter-spacing: 0.05em;">Objetivo</p>
        </ion-text>
        <ion-badge color="secondary" [title]="objetivo">
          {{ objetivo || 'No definido' }}
        </ion-badge>
      </ion-col>

      <ion-col size="4" class="ion-padding-vertical">
        <ion-text color="medium">
          <p class="ion-text-uppercase" style="font-size: 10px; font-weight: 700; letter-spacing: 0.05em;">Frecuencia</p>
        </ion-text>
        <ion-badge color="secondary">
          {{ frecuencia || '0' }} d/sem
        </ion-badge>
      </ion-col>

    </ion-row>
  </ion-grid>

  @if (entrenadorAsignado) {
    <ion-item lines="none">
      <ion-avatar slot="start">
        <img [src]="photoURL || 'assets/images/avatar-placeholder.png'" alt="Avatar">
      </ion-avatar>
      <ion-label>
        <p>{{ entrenadorAsignado }}</p>
      </ion-label>
      <ion-note slot="end" color="medium">Entrenador</ion-note>
    </ion-item>
  }
</ion-card>
