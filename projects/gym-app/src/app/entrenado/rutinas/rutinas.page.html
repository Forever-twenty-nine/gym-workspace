<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-segment [value]="selectedTab()" (ionChange)="segmentChanged($event)" mode="ios">
      <ion-segment-button value="rutinas">
        <ion-label>Rutinas</ion-label>
      </ion-segment-button>
      <ion-segment-button value="historial">
        <ion-label>Historial</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <app-background />

  @switch (selectedTab()) {
    @case ('rutinas') {
      <app-rutinas-semana [rutinasPorDia]="semanaUnificada()" (verDetalles)="abrirDetalles($event)"
        (iniciarEntrenamientoDirecto)="iniciarEntrenamientoDirecto($event.event, $event.rutina)"
        (verEncuentro)="abrirDetallesEncuentro($event)">
      </app-rutinas-semana>
    }
    @case ('historial') {
      <app-rutinas-historial [sesiones]="historialCompletadas()" (verDetalle)="abrirDetalleSesion($event)"
        (eliminar)="eliminarSesion($event.sesion, $event.event)">
      </app-rutinas-historial>
    }
  }

  <app-rutina-detalle-modal [isOpen]="modalAbierto()" [rutina]="rutinaSeleccionada()"
    [ejercicios]="ejerciciosCompletos()" [esFuturo]="esFuturoSeleccionado()" (didDismiss)="cerrarModal()"
    (iniciarEntrenamiento)="iniciarEntrenamiento($event)">
  </app-rutina-detalle-modal>

  <app-encuentro-detalle-modal [isOpen]="encuentroModalAbierto()" [encuentro]="encuentroSeleccionado()"
    (didDismiss)="cerrarModalEncuentro()" (irASocial)="irASocialDesdeEncuentro()">
  </app-encuentro-detalle-modal>

  <app-progreso-historial-detalle [isOpen]="!!sesionSeleccionada()" [sesionSeleccionada]="sesionSeleccionada()"
    (didDismiss)="cerrarDetalleSesion()">
  </app-progreso-historial-detalle>
</ion-content>
