<!-- Segment header (like social page) -->
<ion-header class="relative z-20 px-4 pt-1 pb-2 bg-transparent">
  <ion-segment [value]="selectedTab()" (ionChange)="segmentChanged($event)"
    class="rounded-2xl overflow-hidden border border-white/40 dark:border-white/10 bg-white/40 dark:bg-black/40 backdrop-blur-xl shadow-lg text-[10px]">
    <ion-segment-button value="convocatorias">
      <ion-label class="font-bold text-[10px] uppercase tracking-wider">Convocatorias</ion-label>
    </ion-segment-button>
    <ion-segment-button value="desafios">
      <ion-label class="font-bold text-[10px] uppercase tracking-wider">Desafíos</ion-label>
    </ion-segment-button>
    <ion-segment-button value="rutinas">
      <ion-label class="font-bold text-[10px] uppercase tracking-wider">Rutinas</ion-label>
    </ion-segment-button>
    <ion-segment-button value="ejercicios">
      <ion-label class="font-bold text-[10px] uppercase tracking-wider">Ejercicios</ion-label>
    </ion-segment-button>
  </ion-segment>
</ion-header>

<ion-content [fullscreen]="true" style="--background: transparent;">
  <!-- 
    Background layers.
    We use fixed for the image (full viewport) and absolute for the gradient.
    The key to make them BOTH appear *behind* the bottom tab bar is that the tab bar
    itself must be transparent (see .entrenado-main-tabs ion-tab-bar in ionic-components.css).
    Previously the tab bar had a solid --background that was covering the lower part of any fixed/absolute backgrounds.
  -->
  @if (isPremium()) {
  <div class="fixed inset-0 z-0 opacity-25 dark:opacity-100 pointer-events-none">
    <img ngSrc="assets/images/test-gym-1.jpg" priority fill alt="background"
      class="object-cover filter dark:brightness-[0.4] dark:contrast-125">
  </div>
  }@else {
  <div
    class="bg-linear-to-br from-blue-900 via-green-700 to-blue-900 h-full w-full absolute inset-0 z-0 pointer-events-none">
  </div>
  }

  <div class="relative z-10 px-4 pb-20 pt-2 flex flex-col gap-4">
    @switch (selectedTab()) {
      @case ('convocatorias') {
        <app-convocatoria-list
          [convocatorias]="misConvocatorias()"
          (create)="abrirModalConvocatoria()"
          (delete)="eliminarConvocatoria($event)"
          (edit)="onEditConvocatoria($event)">
        </app-convocatoria-list>
      }

      @case ('desafios') {
        <app-desafio-list
          [desafios]="misDesafios()"
          (create)="abrirModalDesafio()"
          (delete)="eliminarDesafio($event)"
          (edit)="onEditDesafio($event)">
        </app-desafio-list>
      }

      @case ('rutinas') {
        <app-rutina-list
          [rutinas]="rutinasPropias()"
          [isPremium]="isPremium()"
          (create)="abrirModalRutina()"
          (delete)="eliminarRutina($event)"
          (edit)="onEditRutina($event)">
        </app-rutina-list>
      }

      @case ('ejercicios') {
        <app-ejercicio-list
          [ejercicios]="ejerciciosCreados()"
          [isPremium]="isPremium()"
          (create)="abrirModalEjercicio()"
          (delete)="eliminarEjercicio($event)"
          (edit)="onEditEjercicio($event)">
        </app-ejercicio-list>
      }
    }
  </div>

  <!-- Componente Modal de Convocatoria -->
  <app-convocatoria-modal 
    [isOpen]="isConvocatoriaModalOpen()" 
    [item]="convocatoriaToEdit()"
    (close)="cerrarModalConvocatoria()"
    (saved)="onConvocatoriaSaved()">
  </app-convocatoria-modal>

  <!-- Componente Modal de Desafío -->
  <app-desafio-modal
    [isOpen]="isDesafioModalOpen()"
    [item]="desafioToEdit()"
    (close)="cerrarModalDesafio()"
    (saved)="onDesafioSaved()">
  </app-desafio-modal>

  <!-- Componente Modal de Rutina -->
  <app-rutina-modal
    [isOpen]="isRutinaModalOpen()"
    [item]="rutinaToEdit()"
    (close)="cerrarModalRutina()"
    (saved)="onRutinaSaved()">
  </app-rutina-modal>

  <!-- Componente Modal de Ejercicio -->
  <app-ejercicio-modal
    [isOpen]="isEjercicioModalOpen()"
    [item]="ejercicioToEdit()"
    (close)="cerrarModalEjercicio()"
    (saved)="onEjercicioSaved()">
  </app-ejercicio-modal>

</ion-content>
