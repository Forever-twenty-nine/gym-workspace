<ion-card>
  <ion-card-content>
    @if (convocatorias.length > 0) {
      <ion-list lines="none">
        @for (c of convocatorias; track c.id) {
          <ion-item-sliding>
            <ion-item style="--padding-start: 0;">
              <app-date-badge slot="start" [fecha]="c.fechaEntrenamiento"></app-date-badge>
              <ion-label class="ion-margin-start">
                <h2>{{ c.horaInicio }} - {{ c.horaFin }}</h2>
                @if (c.esOficial) {
                  <p><ion-text color="warning">Oficial</ion-text></p>
                }
              </ion-label>
            </ion-item>
            <ion-item-options side="end">
              <ion-item-option color="danger" (click)="onDelete(c.id)">
                <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
              </ion-item-option>
            </ion-item-options>
            <ion-item-options side="start">
              <ion-item-option color="primary" (click)="onEdit(c)">
                <ion-icon name="pencil-outline" slot="icon-only"></ion-icon>
              </ion-item-option>
            </ion-item-options>
          </ion-item-sliding>
        }
      </ion-list>
    } @else {
      <ion-text color="medium">
        <p class="ion-text-center">
          <em>No has publicado convocatorias aún.</em><br>
          <small>Usa el botón "+" para agregar una.</small>
        </p>
      </ion-text>
    }
  </ion-card-content>
</ion-card>
