<ion-card>
  <ion-card-content>
    @if (isPremium) {
      @if (rutinas.length > 0) {
        <ion-list lines="none">
          @for (rut of rutinas; track rut.id) {
            <ion-item-sliding>
              <ion-item>
                <ion-label>
                  <h2>{{ rut.nombre }}</h2>
                </ion-label>
              </ion-item>
              <ion-item-options side="end">
                <ion-item-option color="danger" (click)="onDelete(rut.id)">
                  <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
                </ion-item-option>
              </ion-item-options>
              <ion-item-options side="start">
                <ion-item-option color="primary" (click)="onEdit(rut)">
                  <ion-icon name="pencil-outline" slot="icon-only"></ion-icon>
                </ion-item-option>
              </ion-item-options>
            </ion-item-sliding>
          }
        </ion-list>
      } @else {
        <ion-text color="medium">
          <p class="ion-text-center">
            <em>Aún no has creado rutinas.</em><br>
            <small>Usa el botón "+" para agregar una.</small>
          </p>
        </ion-text>
      }
    } @else {
      <ion-text color="medium">
        <p class="ion-text-center">
          <strong>Rutinas Personalizadas</strong><br>
          Crea rutinas semanales ilimitadas con ejercicios por día.
        </p>
      </ion-text>
      <ion-button expand="block" color="warning" (click)="onCreate()">
        <ion-icon name="lock-closed" slot="start"></ion-icon>
        Desbloquear Premium
      </ion-button>
    }
  </ion-card-content>
</ion-card>
