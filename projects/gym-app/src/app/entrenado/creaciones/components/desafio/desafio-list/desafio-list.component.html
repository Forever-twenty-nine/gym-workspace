<ion-card>
  <ion-card-content>
    @if (desafios.length > 0) {
      <ion-list lines="none">
        @for (d of desafios; track d.id) {
          <ion-item-sliding>
            <ion-item style="--padding-start: 0;">
              <app-date-badge slot="start" [fecha]="d.fechaVencimiento"></app-date-badge>
              <ion-label class="ion-margin-start">
                @if (vencimientoInfo(d.fechaVencimiento); as info) {
                  <p><ion-text [color]="info.color">{{ info.texto }}</ion-text></p>
                }
              </ion-label>
            </ion-item>
            <ion-item-options side="end">
              <ion-item-option color="danger" (click)="onDelete(d.id)">
                <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
              </ion-item-option>
            </ion-item-options>
            <ion-item-options side="start">
              <ion-item-option color="primary" (click)="onEdit(d)">
                <ion-icon name="pencil-outline" slot="icon-only"></ion-icon>
              </ion-item-option>
            </ion-item-options>
          </ion-item-sliding>
        }
      </ion-list>
    } @else {
      <ion-text color="medium">
        <p class="ion-text-center">
          <em>No has lanzado desafíos aún.</em><br>
          <small>Usa el botón "+" para agregar uno.</small>
        </p>
      </ion-text>
    }
  </ion-card-content>
</ion-card>
