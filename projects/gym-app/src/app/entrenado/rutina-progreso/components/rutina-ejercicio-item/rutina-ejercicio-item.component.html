<ion-card (click)="toggle.emit()"
    class="mx-0 mb-4 rounded-2xl shadow-sm border-none transition-all active:scale-[0.98] overflow-hidden"
    [style.background]="completado() ? 'rgba(var(--ion-color-success-rgb, 16, 185, 129), 0.1)' : 'var(--ion-card-background)'">
    <ion-card-content class="p-4 flex items-center gap-4">
        <div class="w-10 h-10 rounded-full flex items-center justify-center transition-all duration-300"
            [style.background]="completado() ? 'var(--ion-color-success)' : 'var(--ion-color-light)'"
            [style.color]="completado() ? 'white' : 'var(--ion-color-medium)'" [class.shadow-lg]="completado()">
            <ion-icon [name]="completado() ? 'checkmark-circle' : 'fitness-outline'"></ion-icon>
        </div>

        <div class="flex-1">
            <h4 class="text-base font-bold m-0 transition-all duration-300"
                [style.color]="completado() ? 'var(--ion-color-success)' : 'var(--color-title)'"
                [class.line-through]="completado()" [class.opacity-70]="completado()">
                {{ ejercicio().nombre }}
            </h4>
            <div class="flex items-center gap-3 mt-1 text-xs font-medium" style="color: var(--ion-color-medium);">
                <span class="flex items-center gap-1">
                    <ion-icon name="repeat-outline" style="color: var(--ion-color-primary);"></ion-icon>
                    {{ ejercicio().series }} x {{ ejercicio().repeticiones }}
                </span>
                @if (ejercicio().descansoSegundos) {
                <span class="flex items-center gap-1">
                    <ion-icon name="time-outline" style="color: var(--ion-color-warning);"></ion-icon>
                    {{ ejercicio().descansoSegundos }}s
                </span>
                }
            </div>
        </div>

        <ion-icon [name]="completado() ? 'checkmark-circle' : 'play-outline'"
            [color]="completado() ? 'success' : 'medium'" class="text-2xl"></ion-icon>
    </ion-card-content>
</ion-card>
