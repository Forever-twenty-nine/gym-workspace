<div class="p-4 shadow-sm mb-2 rounded-b-[32px] flex flex-col items-center justify-center relative"
    style="background: var(--ion-card-background, var(--ion-background-color, #fff));">
    
    <!-- Timer (Huge and Centered) -->
    <div class="text-[5rem] leading-[1] font-black tracking-tighter my-4" style="color: var(--color-title);">
        {{ tiempo() }}
    </div>

    <!-- Progreso y Estado (Subtle) -->
    <div class="w-full px-4 mt-2 mb-1 flex flex-col gap-1.5">
        <div class="flex items-center justify-between w-full text-xs font-semibold uppercase tracking-wider">
            <span [style.color]="iniciada() ? 'var(--ion-color-warning)' : 'var(--ion-color-medium)'">
                {{ estado() }}
            </span>
            <span style="color: var(--ion-color-primary);">{{ porcentaje() }}%</span>
        </div>
        <ion-progress-bar [value]="porcentaje() / 100" color="primary" class="rounded-full h-1.5"></ion-progress-bar>
    </div>
</div>
