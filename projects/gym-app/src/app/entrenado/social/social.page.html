<ion-header class="ion-no-border">
  <ion-toolbar>
    <div style="display: flex; justify-content: center; width: 100%; padding: 0 12px;">
      <ion-segment [value]="selectedTab()" (ionChange)="segmentChanged($event)" mode="ios"
        style="width: 100%; max-width: 420px;">
        <ion-segment-button value="para-ti">
          <ion-label>Para ti</ion-label>
        </ion-segment-button>
        <ion-segment-button value="siguiendo">
          <ion-label>Siguiendo</ion-label>
        </ion-segment-button>
        <ion-segment-button value="descubrir">
          <ion-label>Descubrir</ion-label>
        </ion-segment-button>
      </ion-segment>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" style="--background: transparent;">

  <app-page-background />
  @if (selectedTab() === 'para-ti' && storiesList().length > 0) {
  <div class="sticky top-0 z-50" style="background: rgba(var(--ion-background-color-rgb, 255, 255, 255), 0.85); backdrop-filter: blur(10px);">
    <app-stories [stories]="storiesList()" (storyClick)="handleStoryClick($event)"></app-stories>
  </div>
  }

  <div class="relative z-10 px-4 pb-6 pt-2">
    <!-- Renderizado condicional por componente -->
    @switch (selectedTab()) {
    @case ('descubrir') {
    <app-descubrir-tab [tarjetaActiva]="tarjetaActiva()" (pasar)="pasarTarjeta()" (chocarLos5)="chocarLos5()"
      (cardTransitionEnd)="onCardTransitionEnd()" />
    }
    @case ('para-ti') {
    <app-para-ti-tab />
    }
    @case ('siguiendo') {
    <app-feed-tab tab="siguiendo" />
    }
    }
  </div>

  <!-- Superposición de Match Mutuo (Popup Global a Nivel de Página) -->
  @if (matchActual()) {
  <app-mutual-match-overlay [matchActual]="matchActual()!" [currentUserPhoto]="currentUserPhoto()"
    (iniciarChat)="iniciarChatPrivado()" (cerrarMatch)="cerrarMatch()"></app-mutual-match-overlay>
  }

  <!-- Modales de Stories -->
  <app-convocatoria-modal-stories [isOpen]="isConvoModalOpen()" [convocatoria]="selectedConvocatoria()"
    (close)="closeConvoModal()">
  </app-convocatoria-modal-stories>

  <app-desafio-modal-stories [isOpen]="isDesafioModalOpen()" [desafio]="selectedDesafio()" (close)="closeDesafioModal()"
    (deleted)="onDesafioDeleted($event)" (pasar)="onDesafioPasar($event)">
  </app-desafio-modal-stories>
</ion-content>
