<!-- Tabs de Segmento con Glassmorphism (Fijo fuera de ion-content) -->
<ion-header class="relative z-20 px-4 pt-1 pb-2 bg-transparent">
  <ion-segment [value]="selectedTab()" (ionChange)="segmentChanged($event)">
    <ion-segment-button value="para-ti">
      <ion-label class="font-bold text-xs uppercase tracking-wider">Para ti</ion-label>
    </ion-segment-button>
    <ion-segment-button value="siguiendo">
      <ion-label class="font-bold text-xs uppercase tracking-wider">Siguiendo</ion-label>
    </ion-segment-button>
    <ion-segment-button value="descubrir">
      <ion-label class="font-bold text-xs uppercase tracking-wider">Descubrir</ion-label>
    </ion-segment-button>
  </ion-segment>
</ion-header>

<ion-content [fullscreen]="true" style="--background: transparent;">

  <app-page-background />

  <div class="relative z-10 px-4 pb-6 pt-2">
    <!-- Renderizado condicional por componente -->
    @switch (selectedTab()) {
    @case ('descubrir') {
    <app-descubrir-tab [tarjetaActiva]="tarjetaActiva()" (pasar)="pasarTarjeta()" (chocarLos5)="chocarLos5()"
      (cardTransitionEnd)="onCardTransitionEnd()"></app-descubrir-tab>
    }
    @case ('para-ti') {
    <app-para-ti-tab></app-para-ti-tab>
    }
    @case ('siguiendo') {
    <app-feed-tab tab="siguiendo"></app-feed-tab>
    }
    }
  </div>

  <!-- Superposición de Match Mutuo (Popup Global a Nivel de Página) -->
  @if (matchActual()) {
  <app-mutual-match-overlay [matchActual]="matchActual()!" [currentUserPhoto]="currentUserPhoto()"
    (iniciarChat)="iniciarChatPrivado()" (cerrarMatch)="cerrarMatch()"></app-mutual-match-overlay>
  }
</ion-content>
