<!-- CONVOCATORIAS STORIES -->
@if (convocatoriasActivas().length > 0) {
  @if (showHeader) {
    <!-- Header label (only when standalone) -->
    <div class="mb-3">
      <div class="flex items-center justify-between px-0.5 mb-1.5">
        <div class="flex items-center gap-1.5">
          <ion-icon name="people-outline" class="text-primary text-base"></ion-icon>
          <span class="text-[10px] font-black uppercase tracking-[1.5px] text-gray-500 dark:text-gray-400">Convocatorias del gym</span>
        </div>
        <span class="text-[10px] font-bold text-primary/70">{{ convocatoriasActivas().length }}</span>
      </div>
      <!-- scroller -->
      <div class="flex gap-3.5 overflow-x-auto pb-2 -mx-0.5 px-0.5 snap-x snap-mandatory scrollbar-hide">
        @for (c of convocatoriasActivas(); track c.id) {
          <button
            type="button"
            (click)="openModal(c)"
            class="flex flex-col items-center gap-1.5 min-w-16 shrink-0 active:scale-[0.96] transition-transform focus:outline-none"
          >
            <!-- Story circle -->
            <div class="relative">
              <div class="w-15.5 h-15.5 rounded-full p-[2.5px] bg-linear-to-br from-primary via-violet-500 to-primary shadow-md">
                <div class="w-full h-full rounded-full overflow-hidden border-[2.75px] border-white dark:border-[#0a0a0a] bg-slate-200 dark:bg-slate-800 ring-1 ring-white/60 dark:ring-white/10">
                  @if (getUsuarioPhoto(c.creadorId)) {
                    <img [src]="getUsuarioPhoto(c.creadorId)" class="w-full h-full object-cover" alt="Creador">
                  } @else {
                    <div class="w-full h-full flex items-center justify-center text-slate-400">
                      <ion-icon name="person-outline" class="text-3xl"></ion-icon>
                    </div>
                  }
                </div>
              </div>
              <div class="absolute -bottom-px -right-px bg-white dark:bg-[#111] text-[8px] font-black px-1.5 rounded-full border border-white/80 dark:border-white/15 shadow-sm leading-none py-px text-primary dark:text-primary">
                {{ getStoryTimeHint(c) }}
              </div>
              @if (c.esOficial) {
                <div class="absolute -top-0.5 -left-0.5 w-4 h-4 bg-primary rounded-full border-[1.5px] border-white dark:border-[#111] flex items-center justify-center">
                  <span class="text-[7px] leading-none">🛡️</span>
                </div>
              } @else if (c.esSemanal) {
                <div class="absolute -top-0.5 -left-0.5 w-4 h-4 bg-amber-500 rounded-full border-[1.5px] border-white dark:border-[#111] flex items-center justify-center">
                  <span class="text-[7px] leading-none">🔁</span>
                </div>
              }
            </div>
            <span class="text-[10px] font-extrabold text-gray-700 dark:text-gray-300 truncate w-16 text-center leading-tight">
              {{ getStoryLabel(c) }}
            </span>
          </button>
        }
      </div>
    </div>
  } @else if (renderCircles) {
    <!-- Naked items for unified parent scroller -->
    @for (c of convocatoriasActivas(); track c.id) {
      <button
        type="button"
        (click)="openModal(c)"
        class="flex flex-col items-center gap-1.5 min-w-16 shrink-0 active:scale-[0.96] transition-transform focus:outline-none"
      >
        <div class="relative">
          <div class="w-15.5 h-15.5 rounded-full p-[2.5px] bg-linear-to-br from-primary via-violet-500 to-primary shadow-md">
            <div class="w-full h-full rounded-full overflow-hidden border-[2.75px] border-white dark:border-[#0a0a0a] bg-slate-200 dark:bg-slate-800 ring-1 ring-white/60 dark:ring-white/10">
              @if (getUsuarioPhoto(c.creadorId)) {
                <img [src]="getUsuarioPhoto(c.creadorId)" class="w-full h-full object-cover" alt="Creador">
              } @else {
                <div class="w-full h-full flex items-center justify-center text-slate-400">
                  <ion-icon name="person-outline" class="text-3xl"></ion-icon>
                </div>
              }
            </div>
          </div>
          <div class="absolute -bottom-px -right-px bg-white dark:bg-[#111] text-[8px] font-black px-1.5 rounded-full border border-white/80 dark:border-white/15 shadow-sm leading-none py-px text-primary dark:text-primary">
            {{ getStoryTimeHint(c) }}
          </div>
          @if (c.esOficial) {
            <div class="absolute -top-0.5 -left-0.5 w-4 h-4 bg-primary rounded-full border-[1.5px] border-white dark:border-[#111] flex items-center justify-center">
              <span class="text-[7px] leading-none">🛡️</span>
            </div>
          } @else if (c.esSemanal) {
            <div class="absolute -top-0.5 -left-0.5 w-4 h-4 bg-amber-500 rounded-full border-[1.5px] border-white dark:border-[#111] flex items-center justify-center">
              <span class="text-[7px] leading-none">🔁</span>
            </div>
          }
        </div>
        <span class="text-[10px] font-extrabold text-gray-700 dark:text-gray-300 truncate w-16 text-center leading-tight">
          {{ getStoryLabel(c) }}
        </span>
      </button>
    }
  }
}

<!-- The centered detail modal (opened on story tap) -->
<app-convocatoria-modal
  [isOpen]="isModalOpen()"
  [convocatoria]="selectedConvocatoria()"
  (close)="closeModal()"
  (deleted)="onModalDeleted($event)"
></app-convocatoria-modal>
