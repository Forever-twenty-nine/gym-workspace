<!-- DESAFÍOS STORIES -->
@if (desafiosActivos().length > 0) {
  @if (showHeader) {
    <div class="mb-3">
      <div class="flex items-center justify-between px-0.5 mb-1.5">
        <div class="flex items-center gap-1.5">
          <ion-icon name="trophy-outline" class="text-amber-500 text-base"></ion-icon>
          <span class="text-[10px] font-black uppercase tracking-[1.5px] text-amber-600 dark:text-amber-400">Desafíos activos</span>
        </div>
        <span class="text-[10px] font-bold text-amber-500/70">{{ desafiosActivos().length }}</span>
      </div>

      <div class="flex gap-3.5 overflow-x-auto pb-2 -mx-0.5 px-0.5 snap-x snap-mandatory scrollbar-hide">
        @for (d of desafiosActivos(); track d.id) {
          <button
            type="button"
            (click)="openModal(d)"
            class="flex flex-col items-center gap-1.5 min-w-16 shrink-0 active:scale-[0.96] transition-transform focus:outline-none"
          >
            <div class="relative">
              <div class="w-15.5 h-15.5 rounded-full p-[2.5px] bg-linear-to-br from-amber-500 via-orange-500 to-amber-600 shadow-md">
                <div class="w-full h-full rounded-full overflow-hidden border-[2.75px] border-white dark:border-[#0a0a0a] bg-slate-200 dark:bg-slate-800 ring-1 ring-white/60 dark:ring-white/10">
                  @if (userPhoto(d)) {
                    <img [src]="userPhoto(d)" class="w-full h-full object-cover" alt="">
                  } @else {
                    <div class="w-full h-full flex items-center justify-center text-amber-400">
                      <ion-icon name="trophy-outline" class="text-3xl"></ion-icon>
                    </div>
                  }
                </div>
              </div>
              <div class="absolute -bottom-px -right-px bg-white dark:bg-[#111] text-[8px] font-black px-1.5 rounded-full border border-white/80 dark:border-white/15 shadow-sm leading-none py-px text-amber-600">
                {{ getTimeHint(d) }}
              </div>
              @if (esMio(d)) {
                <div class="absolute -top-0.5 -left-0.5 w-4 h-4 bg-amber-500 rounded-full border-[1.5px] border-white dark:border-[#111] flex items-center justify-center">
                  <span class="text-[8px] leading-none">👑</span>
                </div>
              }
            </div>
            <span class="text-[10px] font-extrabold text-gray-700 dark:text-gray-300 truncate w-16 text-center leading-tight">
              {{ getShortLabel(d) }}
            </span>
          </button>
        }
      </div>
    </div>
  } @else if (renderCircles) {
    <!-- Naked items for unified parent scroller (no header, no own scroller) -->
    @for (d of desafiosActivos(); track d.id) {
      <button
        type="button"
        (click)="openModal(d)"
        class="flex flex-col items-center gap-1.5 min-w-16 shrink-0 active:scale-[0.96] transition-transform focus:outline-none"
      >
        <div class="relative">
          <div class="w-15.5 h-15.5 rounded-full p-[2.5px] bg-linear-to-br from-amber-500 via-orange-500 to-amber-600 shadow-md">
            <div class="w-full h-full rounded-full overflow-hidden border-[2.75px] border-white dark:border-[#0a0a0a] bg-slate-200 dark:bg-slate-800 ring-1 ring-white/60 dark:ring-white/10">
              @if (userPhoto(d)) {
                <img [src]="userPhoto(d)" class="w-full h-full object-cover" alt="">
              } @else {
                <div class="w-full h-full flex items-center justify-center text-amber-400">
                  <ion-icon name="trophy-outline" class="text-3xl"></ion-icon>
                </div>
              }
            </div>
          </div>
          <div class="absolute -bottom-px -right-px bg-white dark:bg-[#111] text-[8px] font-black px-1.5 rounded-full border border-white/80 dark:border-white/15 shadow-sm leading-none py-px text-amber-600">
            {{ getTimeHint(d) }}
          </div>
          @if (esMio(d)) {
            <div class="absolute -top-0.5 -left-0.5 w-4 h-4 bg-amber-500 rounded-full border-[1.5px] border-white dark:border-[#111] flex items-center justify-center">
              <span class="text-[8px] leading-none">👑</span>
            </div>
          }
        </div>
        <span class="text-[10px] font-extrabold text-gray-700 dark:text-gray-300 truncate w-16 text-center leading-tight">
          {{ getShortLabel(d) }}
        </span>
      </button>
    }
  }
}

<!-- Centered modal -->
<app-desafio-modal
  [isOpen]="isModalOpen()"
  [desafio]="selectedDesafio()"
  (close)="closeModal()"
  (deleted)="onDeleted($event)"
  (pasar)="onPasar($event)"
></app-desafio-modal>
