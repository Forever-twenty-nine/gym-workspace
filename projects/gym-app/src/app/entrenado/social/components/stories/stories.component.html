<!-- Historias unificadas en una sola fila, ordenadas por proximidad temporal (más cercanas primero) -->
@if (stories.length > 0) {
<div style="overflow-x: auto; overflow-y: hidden; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none; width: 100%;">
  <!-- Ocultar scrollbar estándar -->
  <style>
    div::-webkit-scrollbar {
      display: none;
    }
  </style>
  <div style="display: flex; gap: 14px; padding: 6px 8px; width: max-content;">
    @for (story of stories; track story.id) {
    @if (story.type === 'convocatoria') {
    <!-- Convocatoria circle -->
    <div (click)="storyClick.emit(story)" style="position: relative; display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 64px;">
      <ion-avatar style="width: 62px; height: 62px; border: 3px solid var(--ion-color-primary); padding: 2px; background: var(--ion-background-color); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);">
        @if (story.photoUrl) {
          <img [src]="story.photoUrl" style="border-radius: 50%; width: 100%; height: 100%; object-fit: cover;" alt="Creador">
        } @else {
          <div style="width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--ion-color-step-150, #eee); color: var(--ion-color-medium);">
            <ion-icon name="person-outline" style="font-size: 30px;"></ion-icon>
          </div>
        }
      </ion-avatar>
    </div>
    } @else {
    <!-- Desafío circle -->
    <div (click)="storyClick.emit(story)" style="position: relative; display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 64px;">
      <ion-avatar style="width: 62px; height: 62px; border: 3px solid var(--ion-color-warning); padding: 2px; background: var(--ion-background-color); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);">
        @if (story.photoUrl) {
          <img [src]="story.photoUrl" style="border-radius: 50%; width: 100%; height: 100%; object-fit: cover;" alt="">
        } @else {
          <div style="width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--ion-color-step-150, #eee); color: var(--ion-color-warning);">
            <ion-icon name="trophy-outline" style="font-size: 30px;"></ion-icon>
          </div>
        }
      </ion-avatar>
    </div>
    }
    }
  </div>
</div>
}
