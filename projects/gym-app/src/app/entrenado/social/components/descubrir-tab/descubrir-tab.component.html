<div class="flex flex-col items-center justify-center min-h-137.5 px-2 py-4">
  @if (tarjetaActiva) {
  <div class="w-full max-w-md flex flex-col gap-4 relative">

    <!-- Contenedor de la Tarjeta con Animación de Deslizamiento -->
    <div [class]="animacionCard()" (transitionend)="onCardTransitionEnd()">
      <app-match-card [tipo]="tarjetaActiva.tipo" [data]="tarjetaActiva.data">
      </app-match-card>
    </div>

    <div class="flex justify-center items-center gap-6 mt-2">
      <!-- Botón Pasar (Descartar) -->
      <ion-button (click)="onPasar()" color="secondary" fill="outline">
        <ion-icon name="close" class="text-2xl "></ion-icon>
      </ion-button>

      <ion-button (click)="onChocarLos5()" color="primary" fill="solid">
        <ion-icon name="hand-right" class="text-3xl "></ion-icon>
      </ion-button>
    </div>

  </div>
  } @else {
  <!-- Estado Vacío del Mazo -->
  <div
    class="flex flex-col items-center justify-center text-center p-8 bg-white/40 dark:bg-black/40 backdrop-blur-xl rounded-4xl border border-white/20 dark:border-white/10 max-w-md w-full my-6">
    <div
      class="w-16 h-16 bg-primary/10 border border-primary/20 rounded-2xl flex items-center justify-center mb-5 text-primary">
      <ion-icon name="sparkles-outline" class="text-3xl"></ion-icon>
    </div>
    <h3 class="text-base font-black text-gray-900 dark:text-white mb-2 tracking-tight">¡Eso es todo por hoy!</h3>
    <p class="text-xs font-semibold text-gray-600 dark:text-gray-400 px-4 leading-relaxed m-0">
      Has completado tu mazo de sugerencias. Vuelve más tarde para ver nuevos compañeros o desafíos disponibles en tu
      gimnasio.
    </p>
  </div>
  }
</div>
