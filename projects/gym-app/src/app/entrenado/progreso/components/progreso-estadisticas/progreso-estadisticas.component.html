<ion-card class="rounded-3xl shadow-xl relative overflow-hidden bg-white/40 dark:bg-black/40 backdrop-blur-xl m-4 mt-6 mb-8 border border-white/20 dark:border-white/10">

    <!-- Decoraciones de fondo absoluto -->
    <div class="absolute top-0 right-0 -mr-8 -mt-8 opacity-10 dark:opacity-20 text-gray-400 dark:text-white pointer-events-none z-0">
        <ion-icon name="trophy-outline" style="font-size: 140px;"></ion-icon>
    </div>
    <div class="absolute bottom-0 left-0 -ml-8 -mb-8 opacity-5 dark:opacity-10 text-gray-400 dark:text-white pointer-events-none z-0">
        <ion-icon name="fitness-outline" style="font-size: 100px;"></ion-icon>
    </div>

    <ion-card-content class="relative z-10 pt-6 pb-6 px-4">
        <ion-grid>
            <ion-row>
                <!-- Card: Completadas -->
                <ion-col size="6" size-md="3" class="p-2">
                    <div
                        class="bg-white/60 dark:bg-white/10 rounded-2xl p-4 backdrop-blur-sm border border-gray-200 dark:border-white/20 flex flex-col items-center justify-center transition-transform active:scale-95 h-full shadow-sm dark:shadow-none">
                        <ion-icon name="checkmark-circle-outline" class="text-3xl text-emerald-500 dark:text-emerald-300 mb-1"></ion-icon>
                        <ion-text class="text-3xl font-black text-gray-900 dark:text-white">{{ stats.completadas }}</ion-text>
                        <ion-text
                            class="text-[10px] text-gray-500 dark:text-white/90 font-bold uppercase tracking-widest text-center mt-1">Completadas</ion-text>
                    </div>
                </ion-col>

                <!-- Card: Tiempo Total -->
                <ion-col size="6" size-md="3" class="p-2">
                    <div
                        class="bg-white/60 dark:bg-white/10 rounded-2xl p-4 backdrop-blur-sm border border-gray-200 dark:border-white/20 flex flex-col items-center justify-center transition-transform active:scale-95 h-full shadow-sm dark:shadow-none">
                        <ion-icon name="time-outline" class="text-3xl text-orange-400 dark:text-orange-200 mb-1"></ion-icon>
                        <ion-text class="text-2xl font-black mt-1 text-gray-900 dark:text-white">{{ formatearTiempo(stats.tiempoTotal) }}</ion-text>
                        <ion-text
                            class="text-[10px] text-gray-500 dark:text-white/90 font-bold uppercase tracking-widest text-center mt-1">Tiempo</ion-text>
                    </div>
                </ion-col>

                <!-- Card: Asignadas -->
                <ion-col size="6" size-md="3" class="p-2">
                    <div
                        class="bg-white/60 dark:bg-white/10 rounded-2xl p-4 backdrop-blur-sm border border-gray-200 dark:border-white/20 flex flex-col items-center justify-center transition-transform active:scale-95 h-full shadow-sm dark:shadow-none">
                        <ion-icon name="fitness-outline" class="text-3xl text-sky-500 dark:text-sky-200 mb-1"></ion-icon>
                        <ion-text class="text-2xl font-black mt-1 text-gray-900 dark:text-white">{{ stats.rutinasAsignadas }}</ion-text>
                        <ion-text
                            class="text-[10px] text-gray-500 dark:text-white/90 font-bold uppercase tracking-widest text-center mt-1">Asignadas</ion-text>
                    </div>
                </ion-col>

                <!-- Card: En progreso -->
                <ion-col size="6" size-md="3" class="p-2">
                    <div
                        class="bg-white/60 dark:bg-white/10 rounded-2xl p-4 backdrop-blur-sm border border-gray-200 dark:border-white/20 flex flex-col items-center justify-center transition-transform active:scale-95 h-full shadow-sm dark:shadow-none">
                        <ion-icon name="flame-outline" class="text-3xl text-rose-400 dark:text-rose-300 mb-1"></ion-icon>
                        <ion-text class="text-2xl font-black mt-1 text-gray-900 dark:text-white">{{ stats.enProgreso }}</ion-text>
                        <ion-text
                            class="text-[10px] text-gray-500 dark:text-white/90 font-bold uppercase tracking-widest text-center mt-1">En Progreso</ion-text>
                    </div>
                </ion-col>
            </ion-row>
        </ion-grid>
    </ion-card-content>
</ion-card>
