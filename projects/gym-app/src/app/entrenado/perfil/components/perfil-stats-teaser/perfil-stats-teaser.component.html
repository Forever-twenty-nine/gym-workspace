<ion-card class="ion-no-margin" style="border: 1px solid var(--ion-color-warning); background: var(--ion-color-warning-tint); color: var(--ion-color-warning-shade); text-align: center;">
  <ion-card-content>
    <ion-icon name="trophy-outline" color="warning" style="font-size: 3rem;"></ion-icon>
    <ion-card-title style="color: var(--ion-color-warning-shade); font-weight: bold; margin: 8px 0;">Estadísticas Avanzadas</ion-card-title>
    <p style="font-size: 0.75rem; line-height: 1.4;">
      Registrá tus entrenamientos y desbloqueá el gráfico semanal de actividad, el historial detallado de
      sesiones y las rachas de entrenamiento con una cuenta Premium.
    </p>
    <ion-button (click)="viewPlansClick.emit()" color="warning" fill="solid" size="small" style="font-weight: bold; margin-top: 12px;">
      Ver Planes
    </ion-button>
  </ion-card-content>
</ion-card>
