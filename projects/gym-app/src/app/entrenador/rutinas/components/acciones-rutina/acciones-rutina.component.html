<ion-card>
    <ion-card-content>
        <!-- Indicador de límite de plan -->
        <div style="margin-bottom: 16px; text-align: center;">
            <ion-text [color]="hasReachedLimit() ? 'warning' : 'medium'" style="font-size: 0.9em;">
                <ion-icon name="information-circle-outline" style="margin-right: 4px;"></ion-icon>
                {{ limitMessage() }}
            </ion-text>
        </div>

        <ion-button expand="block" fill="solid" color="primary" (click)="crearRutina.emit()"
            [disabled]="hasReachedLimit()">
            <ion-icon name="fitness-outline" slot="start"></ion-icon>
            Crear Nueva Rutina
            @if (hasReachedLimit()) {
            <ion-icon name="lock-closed" slot="end"></ion-icon>
            }
        </ion-button>

        @if (hasReachedLimit()) {
        <ion-text color="warning" style="display: block; text-align: center; margin-top: 8px; font-size: 0.85em;">
            Has alcanzado el límite de tu plan. Actualiza para crear más rutinas.
        </ion-text>
        }
    </ion-card-content>
</ion-card>
