

<ion-content [fullscreen]="true">
  
  <app-background />
  <!-- Acciones y Límite de Plan -->
  <app-acciones-rutina [hasReachedLimit]="hasReachedRutinaLimit()" [limitMessage]="rutinaLimitMessage()"
    (crearRutina)="crearRutina()">
  </app-acciones-rutina>

  <!-- Lista de Rutinas -->
  <app-lista-rutinas [rutinas]="rutinasCreadas()" (verRutina)="verRutina($event)" (deleteRutina)="deleteRutina($event)">
  </app-lista-rutinas>

  <!-- Modal para crear/editar rutina -->
  <app-rutina-modal [isOpen]="isRutinaModalOpen()" [isCreating]="isRutinaCreating()" [rutinaData]="rutinaSeleccionada()"
    [ejercicios]="ejerciciosCreados()" 
    [diasSemana]="diasSemana"
    (close)="closeRutinaModal()" 
    (save)="saveRutinaChanges($event)">
  </app-rutina-modal>
</ion-content>
