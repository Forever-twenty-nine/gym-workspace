<ion-content [fullscreen]="true" style="--background: transparent;">
  
  <app-trainer-background [isPremium]="isPremium()"></app-trainer-background>

  <div class="main-container ion-padding relative z-10 flex flex-col gap-6 pb-20">
    
    <!-- Botón para crear nueva sesión en agenda -->
    <div class="flex justify-between items-center gap-4 bg-white/40 dark:bg-black/40 backdrop-blur-xl border border-white/20 dark:border-white/10 rounded-3xl p-4 shadow-lg">
      <div class="text-left">
        <h3 class="text-sm font-black text-gray-900 dark:text-white m-0">Planificar Actividades</h3>
        <p class="text-[10px] font-semibold text-gray-700 dark:text-gray-300 m-0">Agrega WODs o clases oficiales para el gimnasio.</p>
      </div>
      <ion-button (click)="abrirCrearModal()" class="premium-button font-black text-xs px-4 m-0! rounded-2xl! overflow-hidden">
        <ion-icon name="add" slot="start" class="text-sm"></ion-icon>
        Programar WOD
      </ion-button>
    </div>

    <!-- Selector de Segmento -->
    <ion-segment [value]="segmentoActivo()" (ionChange)="cambiarSegmento($event)" class="premium-segment bg-white/30 dark:bg-black/30 backdrop-blur-md rounded-2xl p-1">
      <ion-segment-button value="oficial" class="font-extrabold text-xs">
        <ion-label>Agenda Oficial (WODs)</ion-label>
      </ion-segment-button>
      <ion-segment-button value="atletas" class="font-extrabold text-xs">
        <ion-label>Propuestas de Atletas</ion-label>
      </ion-segment-button>
    </ion-segment>

    <!-- Contenido de Convocatorias Oficiales (WODs) -->
    @if (segmentoActivo() === 'oficial') {
      <app-convocatoria-list
        [items]="mappedConvocatoriasOficiales()"
        emptyTitle="Agenda vacía"
        emptyMessage="No tienes entrenamientos o WODs planificados para hoy o mañana."
        emptyIcon="calendar-outline"
        (eliminar)="confirmarEliminacion($event)">
      </app-convocatoria-list>
    }

    <!-- Contenido de Convocatorias de Atletas (Propuestas) -->
    @if (segmentoActivo() === 'atletas') {
      <app-convocatoria-list
        [items]="mappedConvocatoriasAtletas()"
        emptyTitle="Sin propuestas"
        emptyMessage="No hay convocatorias activas publicadas por tus alumnos por el momento."
        emptyIcon="hand-right-outline"
        (eliminar)="confirmarEliminacion($event)">
      </app-convocatoria-list>
    }

  </div>

  <!-- Modal Component para Crear Sesión de Agenda -->
  <app-crear-agenda-modal 
    [isOpen]="isCrearModalOpen()" 
    (close)="cerrarCrearModal()"
    (saved)="onSesionSaved()">
  </app-crear-agenda-modal>
</ion-content>
