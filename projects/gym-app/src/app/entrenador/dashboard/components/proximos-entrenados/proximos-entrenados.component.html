@if (entrenados().length > 0) {
<div class="p-2 m-2">
  <div class="py-2 mb-3 text-center">
    <h3 class="text-xs font-bold uppercase tracking-widest text-white/70 m-0">próximos 3 días</h3>
    <p class="text-[10px] text-white/45 mt-1 mb-0">Entrenados con rutinas programadas en los siguientes 3 días</p>
  </div>
  <ion-list style="background: none;" class="p-0 m-0">
    @for (entrenado of entrenados(); track entrenado.id) {
    <div class="gym-sliding-item">
      <ion-item [button]="false" [detail]="false" class="--background: transparent;">
        <ion-avatar slot="start">
          <img [src]="'https://api.dicebear.com/7.x/avataaars/svg?seed=' + entrenado.id" />
        </ion-avatar>
        <ion-label slot="start" class="mx-2">
          <h3 class="font-bold text-white">{{ getUserName()(entrenado.id) }}</h3>
          <p class="text-white/60 text-xs mt-1 truncate max-w-xs">{{ entrenado.nombreRutina }}</p>
        </ion-label>
      </ion-item>
    </div>
    }
  </ion-list>
</div>
} @else {
<div class="m-4 bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-10 text-center text-white/50">
  <ion-icon name="calendar-outline" class="text-6xl mb-4 opacity-20"></ion-icon>
  <p class="text-base">No hay rutinas asignadas para los próximos 3 días.</p>
</div>
}
