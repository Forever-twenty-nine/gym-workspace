

<ion-content [fullscreen]="true">
  <!-- Background Image Layer (Fixed) -->
  @if (isPremium()) {
  <div class="fixed inset-0 z-0 opacity-25 dark:opacity-100 pointer-events-none">
    <img ngSrc="assets/images/trainer-bg.png" priority fill alt="background"
      class="object-cover filter dark:brightness-[0.4] dark:contrast-125">
  </div>
  }@else {
  <div
    class="bg-linear-to-br from-blue-900 via-green-700 to-blue-900 h-full w-full absolute inset-0 z-0 pointer-events-none">
  </div>
  }

  <!-- ESTADÍSTICAS ION-GRID + DIV (Sólo Premium) -->
  <app-estadisticas-cards
    [entrenadosCount]="entrenadosAsignadosCount()"
    [ejerciciosCount]="ejerciciosCreadosCount()"
    [rutinasCount]="rutinasCreadasCount()"
    [isPremium]="isPremium()">
  </app-estadisticas-cards>

  <!-- PRÓXIMOS ENTRENAMIENTOS -->
  <app-proximos-entrenados
    [entrenados]="entrenadosConRutinasProximas()"
    [getUserName]="getUserName.bind(this)">
  </app-proximos-entrenados>
</ion-content>
