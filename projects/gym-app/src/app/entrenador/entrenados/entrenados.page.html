

<ion-content [fullscreen]="true">
  <!-- Background Image Layer (Fixed) -->
  @if (isPremium()) {
  <div class="fixed inset-0 z-0 opacity-25 dark:opacity-100 pointer-events-none">
    <img ngSrc="assets/images/trainer-bg.png" priority fill alt="background"
      class="object-cover filter dark:brightness-[0.4] dark:contrast-125">
  </div>
  }@else {
  <div
    class="bg-linear-to-br from-blue-900 via-green-700 to-blue-900 h-full w-full absolute inset-0 z-0 pointer-events-none">
  </div>
  }

  <!-- Acciones y Límite de Plan -->
  <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-3xl overflow-hidden mb-6 p-4 text-center">
    <ion-button expand="block" fill="solid" color="primary" (click)="openInvitacionModal()" [disabled]="hasReachedClientLimit()">
      <ion-icon name="mail-outline" slot="start"></ion-icon>
      Nuevo Entrenado
      @if (hasReachedClientLimit()) {
      <ion-icon name="lock-closed" slot="end"></ion-icon>
      }
    </ion-button>
    <div class="mt-3">
      <ion-text [color]="hasReachedClientLimit() ? 'warning' : 'medium'" class="text-sm">
        {{ clientLimitMessage() }}
        @if (hasReachedClientLimit()) {
        <p class="text-xs mt-1 mb-0">Límite alcanzado. Actualiza para crear más.</p>
        }
      </ion-text>
    </div>
  </div>

  <!-- Listado de Entrenados -->
  <app-mis-entrenados [entrenados]="entrenadosAsociados()" [getUserName]="getUserName.bind(this)"
    [estaEntrenando]="estaEntrenando.bind(this)" [getRutinasCount]="getRutinasAsignadasCount.bind(this)"
    (verCliente)="verCliente($event)" (openRutinasModal)="openRutinasModal($event)">
  </app-mis-entrenados>

  <!-- Invitaciones Pendientes -->
  <app-invitaciones-pendientes [invitaciones]="invitacionesPendientes()" (onCancelar)="cancelarInvitacion($event)">
  </app-invitaciones-pendientes>

  <!-- Detalle del Entrenado -->
  <app-entrenado-detalle-popover [isOpen]="isModalOpen()" [entrenado]="selectedEntrenado()"
    [estadisticas]="estadisticasEntrenado()" [getUserName]="getUserName.bind(this)"
    [formatearTiempo]="formatearTiempo.bind(this)" [getAntiguedadDias]="getAntiguedadDias.bind(this)"
    (close)="closeModal()">
  </app-entrenado-detalle-popover>

</ion-content>

<!-- Modal de Invitación -->
<app-invitacion-modal [isOpen]="isInvitacionModalOpen()" [form]="invitacionForm()"
  [isSaveDisabled]="isInvitacionSaveDisabled()" (close)="closeInvitacionModal()" (save)="saveInvitacion()">
</app-invitacion-modal>

<!-- Modal de Gestión de Rutinas -->
<app-gestion-rutinas-modal [isOpen]="isRutinasModalOpen()" [entrenado]="selectedEntrenado()"
  [rutinasEntrenado]="rutinasEntrenado()" [rutinasDisponibles]="rutinasDisponibles()" [diasSemana]="diasSemana"
  [plan]="plan()" [getUserName]="getUserName.bind(this)" [getDiasAsignados]="getDiasAsignados.bind(this)"
  (close)="closeRutinasModal()" (desasignarRutina)="desasignarRutina($event)"
  (quitarDiaDeRutina)="quitarDiaDeRutina($event.rutinaId, $event.dia)"
  (asignarDiaARutina)="asignarDiaARutina($event.rutina, $event.event)" (asignarRutina)="asignarRutina($event)">
</app-gestion-rutinas-modal>
