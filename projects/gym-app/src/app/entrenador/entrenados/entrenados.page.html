<app-header-entrenador></app-header-entrenador>

<ion-content [fullscreen]="true">
  <div class="entrenados-container">
    <!-- Listado de Entrenados -->
    <app-mis-entrenados [entrenados]="entrenadosAsociados()" [getUserName]="getUserName"
      [estaEntrenando]="estaEntrenando" [getRutinasCount]="getRutinasAsignadasCount" (verCliente)="verCliente($event)"
      (openRutinasModal)="openRutinasModal($event)" (openInvitacionModal)="openInvitacionModal()">
    </app-mis-entrenados>

    <!-- Invitaciones Pendientes -->
    <app-invitaciones-pendientes [invitaciones]="invitacionesPendientes()" (onCancelar)="cancelarInvitacion($event)">
    </app-invitaciones-pendientes>
  </div>

  <!-- Detalle del Entrenado -->
  <app-entrenado-detalle-popover [isOpen]="isModalOpen()" [entrenado]="selectedEntrenado()"
    [estadisticas]="estadisticasEntrenado()" [getUserName]="getUserName" [formatearTiempo]="formatearTiempo"
    [getAntiguedadDias]="getAntiguedadDias" (close)="closeModal()">
  </app-entrenado-detalle-popover>
</ion-content>

<!-- Modal de Invitación -->
<app-invitacion-modal [isOpen]="isInvitacionModalOpen()" [form]="invitacionForm()"
  [isSaveDisabled]="isInvitacionSaveDisabled()" (close)="closeInvitacionModal()" (save)="saveInvitacion()">
</app-invitacion-modal>

<!-- Modal de Gestión de Rutinas -->
<app-gestion-rutinas-modal [isOpen]="isRutinasModalOpen()" [entrenado]="selectedEntrenado()"
  [rutinasEntrenado]="rutinasEntrenado()" [rutinasDisponibles]="rutinasDisponibles()" [diasSemana]="diasSemana"
  [getUserName]="getUserName" [getDiasAsignados]="getDiasAsignados.bind(this)" (close)="closeRutinasModal()"
  (desasignarRutina)="desasignarRutina($event)" (quitarDiaDeRutina)="quitarDiaDeRutina($event.rutinaId, $event.dia)"
  (asignarDiaARutina)="asignarDiaARutina($event.rutina, $event.event)" (asignarRutina)="asignarRutina($event)">
</app-gestion-rutinas-modal>
