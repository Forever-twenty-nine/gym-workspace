<div class="">
    <ion-list class="p-2 m-2" style="background: none;">
        @for (entrenado of entrenados(); track entrenado.id) {
        <ion-item-sliding class="gym-sliding-item" #slidingItem>
            <!-- Item principal que muestra el nombre del entrenado y su objetivo -->
            <ion-item [button]="true" [detail]="false" (click)="toggleSliding(slidingItem)">
                <ion-avatar slot="start">
                    <img [src]="entrenado.photoURL || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + entrenado.id" />
                </ion-avatar>
                <ion-label slot="start" class="mx-2">
                    <h3 class="font-bold text-white">{{ getUserName()(entrenado.id) }}</h3>
                </ion-label>
                <ion-note slot="end" class="mx-2 text-white/50 text-xs">
                    {{ entrenado.objetivo }}
                </ion-note>
            </ion-item>
            <!-- Opciones al deslizar el item -->
            <ion-item-options side="end">
                <ion-item-option color="secondary" (click)="openRutinasModal.emit(entrenado)">
                    <ion-icon slot="start" name="barbell-outline"></ion-icon>

                </ion-item-option>
                <ion-item-option color="primary" (click)="verCliente.emit(entrenado)">
                    <ion-icon slot="start" name="eye-outline"></ion-icon>

                </ion-item-option>
            </ion-item-options>

        </ion-item-sliding>
        }
    </ion-list>
</div>
