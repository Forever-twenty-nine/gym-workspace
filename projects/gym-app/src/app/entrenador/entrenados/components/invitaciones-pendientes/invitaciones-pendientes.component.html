@if (invitaciones().length > 0) {
<div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-3xl overflow-hidden mt-6 p-4">
    <div class="py-2 border-b border-white/5 mb-3">
        <h3 class="text-center text-xs font-bold uppercase tracking-widest text-white/70 m-0">Invitaciones Pendientes</h3>
    </div>
    <ion-list style="background: transparent;" class="p-0 m-0">
        @for (invitacion of invitaciones(); track invitacion.id) {
        <ion-item class="--background: transparent; mb-1">
            <ion-label>
                <h3 class="font-bold text-white">{{ invitacion.entrenadoNombre }}</h3>
                <p class="text-white/60 text-xs">{{ invitacion.emailEntrenado }}</p>
                <p class="text-[10px] text-white/40">
                    Enviada el {{ invitacion.fechaCreacion | date:'dd/MM/yyyy HH:mm' }}
                </p>
            </ion-label>
            <ion-button slot="end" fill="clear" color="danger" (click)="onCancelar.emit(invitacion.id)">
                <ion-icon name="close-circle-outline" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-item>
        }
    </ion-list>
</div>
}
