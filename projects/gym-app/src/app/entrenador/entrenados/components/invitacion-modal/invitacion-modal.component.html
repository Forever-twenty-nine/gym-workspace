<ion-modal [isOpen]="isOpen()" (willDismiss)="close.emit()">
    <ng-template>
        <ion-header>
            <app-header-entrenador></app-header-entrenador>
        </ion-header>
        <ion-content class="ion-padding">
            <form [formGroup]="form()" (ngSubmit)="save.emit()">
                <ion-item>
                    <ion-input label="Email del Invitado" labelPlacement="stacked" type="email" formControlName="email"
                        placeholder="ejemplo@email.com">
                    </ion-input>
                </ion-item>

                <ion-item>
                    <ion-textarea label="Mensaje Personalizado (opcional)" labelPlacement="stacked"
                        formControlName="mensaje" placeholder="¡Hola! Me gustaría ser tu entrenador..." rows="4">
                    </ion-textarea>
                </ion-item>

                <ion-button expand="block" type="submit" [disabled]="isSaveDisabled()" class="ion-margin-top">
                    <ion-icon name="mail-outline" slot="start"></ion-icon>
                    Enviar Invitación
                </ion-button>

            </form>
        </ion-content>
    </ng-template>
</ion-modal>
