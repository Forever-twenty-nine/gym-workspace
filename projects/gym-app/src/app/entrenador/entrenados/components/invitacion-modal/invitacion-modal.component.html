<ion-modal [isOpen]="isOpen()" (willDismiss)="close.emit()">
    <ng-template>
        <ion-header>

            <ion-toolbar>

                <ion-buttons slot="start">
                    <ion-button (click)="cancel()">Cancelar</ion-button>
                </ion-buttons>

                <ion-title class="ion-text-center">Enviar Invitación</ion-title>

                <ion-buttons slot="end">
                    <ion-button (click)="save.emit()" [strong]="true" [disabled]="isSaveDisabled()">Confirmar</ion-button>
                </ion-buttons>

            </ion-toolbar>

        </ion-header>
        <ion-content class="ion-padding">
            <form [formGroup]="form()" (ngSubmit)="save.emit()">
                <ion-item>
                    <ion-input label="Email del Invitado" labelPlacement="stacked" type="email" formControlName="email"
                        placeholder="ejemplo@email.com">
                    </ion-input>
                </ion-item>

                <ion-item>
                    <ion-textarea label="Mensaje Personalizado (opcional)" labelPlacement="stacked"
                        formControlName="mensaje" placeholder="¡Hola! Me gustaría ser tu entrenador..." rows="4">
                    </ion-textarea>
                </ion-item>

            </form>
        </ion-content>
    </ng-template>
</ion-modal>
