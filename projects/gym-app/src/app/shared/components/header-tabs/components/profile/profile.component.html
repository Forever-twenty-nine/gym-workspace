<ion-menu side="start" menuId="profile-menu" contentId="main-content">
  <ion-header class="ion-no-border" class="ion-padding">
    <ion-toolbar color="black">
      <ion-title>Mi Perfil</ion-title>
      <ion-buttons slot="end">
        <ion-button (click)="openEditModal()">
          <ion-icon slot="icon-only" name="pencil-outline"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding" color="black">
    @if (currentUser(); as user) {
    <div class="flex flex-col items-center gap-4 py-8 mb-6">
      <div class="relative">
        <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-primary/20 shadow-xl">
          @if (user.photoURL) {
          <img [ngSrc]="user.photoURL" fill class="object-cover" alt="Foto de perfil" />
          } @else {
          <div class="w-full h-full bg-primary/10 flex items-center justify-center text-3xl font-bold text-primary">
            {{ getIniciales(user.nombre) }}
          </div>
          }
        </div>
      </div>

      <div class="text-center">
        <h2 class="ion-no-margin text-2xl font-bold text-white">{{ user.nombre }}</h2>
        <p class="ion-no-margin text-white/60 font-medium">{{ getRoleDisplayName(user.role) }}</p>
      </div>
    </div>

    <app-profile-info-card [user]="user" [ultimasolicitud]="ultimasolicitud()" [entrenadoData]="currentEntrenado()"
      (openPremiumModalClicked)="openPremiumModal()">
    </app-profile-info-card>
    } @else if (!isLoggingOut()) {
    <div class="flex flex-col items-center justify-center p-6 h-full">
      <ion-spinner name="crescent" color="primary"></ion-spinner>
      <p class="mt-4 text-white font-medium">Cargando...</p>
    </div>
    }
  </ion-content>

  @if (currentUser()) {
  <ion-footer class="ion-no-border">
    <ion-toolbar color="black" class="ion-padding">
      <ion-button expand="block" color="danger" fill="outline" class="font-bold h-12" (click)="logout()">
        <ion-icon name="log-out-outline" slot="start"></ion-icon>
        Cerrar Sesión
      </ion-button>
    </ion-toolbar>
  </ion-footer>
  }
</ion-menu>

<!-- Modal de Edición -->
<app-edit-profile-modal [isOpen]="isEditModalOpen()" [user]="currentUser()" [entrenadoData]="currentEntrenado()"
  (modalClosed)="closeEditModal()" (logoutClicked)="logout()">
</app-edit-profile-modal>

<!-- Modal de Solicitud Premium -->
<app-premium-request-modal [isOpen]="isPremiumModalOpen()" [user]="currentUser()" (modalClosed)="closePremiumModal()">
</app-premium-request-modal>
