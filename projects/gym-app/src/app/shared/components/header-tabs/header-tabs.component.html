<ion-header [translucent]="true" class="ion-no-border">
    <ion-toolbar class="px-2 pt-2">
        <ion-buttons slot="start">
            <ion-menu-button menu="profile-menu"></ion-menu-button>
        </ion-buttons>

        <ion-title class="text-center uppercase tracking-widest font-bold text-lg">Gym App</ion-title>

        <ion-buttons slot="end">
            <ion-menu-button menu="notifications-menu" class="relative">
                <ion-icon name="notifications-outline"></ion-icon>
                @if (notificacionesCount() > 0) {
                <ion-badge color="danger"
                    class="absolute -top-1 -right-1 min-w-[18px] h-[18px] flex items-center justify-center text-[9px] p-0 rounded-full border-2 border-white">
                    {{ notificacionesCount() }}
                </ion-badge>
                }
            </ion-menu-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>
