<!-- Button float -->
<ion-button slot="start" fill="clear" class="fixed top-4 left-2 z-10 text-white" (click)="goToWelcome()">
  <ion-icon name="arrow-back-outline"></ion-icon>
</ion-button>

<ion-content [fullscreen]="true" class="ion-padding"
  style="--background: url('/assets/images/bg.jpg') no-repeat center center / cover;">

  <!-- bg gradient & blur -->
  <div class="fixed inset-0 z-0">
    <div class="w-full h-full bg-[url('/assets/images/bg.jpg')] bg-cover bg-center blur-xs"></div>
    <div class="absolute inset-0 bg-linear-to-b from-transparent via-black/70 to-black pointer-events-none"></div>
  </div>

  <!-- content -->
  <div class="z-10 p-2 relative flex items-start justify-center ">

    <div class="mt-12 w-full">
      <h1 class="text-white font-semibold font-heading text-3xl mb-4">
        Bienvenido a GymApp
      </h1>
      <p class="mb-2 text-white/80">
        Inicia sesión con:
      </p>
      <ion-button expand="block" fill="outline" size="large" shape="round" color="primary"
        class="normal-case mb-4 mt-0! " (click)="loginWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google" />
        <span class="pl-3 text-base">Cuenta de Google</span>
      </ion-button>
      <p class="mb-2 text-white/80">
        O continua con:
      </p>


      <form>
        <!-- email -->
        <ion-input label="Email" label-placement="floating" type="email" name="email" [ngModel]="email()"
          (ngModelChange)="email.set($event)" placeholder="Ingresa tu email" class="mb-2 text-white">
          <ion-icon name="person-outline" slot="start" aria-hidden="true" class="mr-2 text-white/60">
          </ion-icon>
        </ion-input>

        <!-- password -->
        <ion-input label="Contraseña" label-placement="floating" type="password" name="password" [ngModel]="password()"
          (ngModelChange)="password.set($event)" placeholder="Ingresa tu contraseña" class="mb-2 text-white">
          <ion-icon name="lock-closed-outline" slot="start" aria-hidden="true" class="mr-2 text-white/60">
          </ion-icon>
        </ion-input>

        <div class="flex items-center mb-2 px-1">
          <ion-checkbox [checked]="rememberMe()" (ionChange)="toggleRememberMe($event.detail.checked)"
            label-placement="end" justify="start" class="text-white text-sm">
            Recordar mi contraseña
          </ion-checkbox>
        </div>

        <div class="flex gap-2 items-center justify-center mb-4">
          <ion-button expand="block" fill="clean" size="default" shape="round" color="primary"
            (click)="goToForgotPassword()" class="mt-0!">
            ¿Olvidaste tu contraseña?
          </ion-button>
        </div>
      </form>

      <!-- Error message -->
      @if (errorMessage()) {
      <div class="mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg">
        <p class="text-red-200 text-sm">{{ errorMessage() }}</p>
      </div>
      }

      <ion-button expand="block" fill="solid" size="large" shape="round" color="primary" (click)="login()" class="">
        Iniciar Sesión
      </ion-button>



    </div>
  </div>

</ion-content>
